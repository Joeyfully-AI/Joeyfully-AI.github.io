lang: en
title: Joey J. Yang
description: Personal website of Joey Jiayu Yang.
copyright: © 2026. All rights reserved.

url: "https://Joeyfully-AI.github.io"
baseurl: ""

theme: jekyll-theme-hydejack

tagline: Reliable Robot Learning

menu:
  - title: About
    url: /
  - title: Research
    url: /research/
  - title: Misc
    url: /misc/

author:
  name: Joey Jiayu Yang
  picture: /assets/img/profile.jpg
  about: |
    I am interested in Embodied AI, Robot Learning, Vision-Language-Action models, and reliable robotic manipulation.
  social:
    github: Joeyfully-AI
    huggingface: https://huggingface.co/Joeyfully

accent_image: /assets/img/sidebar-bg.jpg
accent_color: rgb(79,177,186)
theme_color: rgb(25,55,71)

google_fonts: false

hydejack:
  post_addons: []
  project_addons: []

  no_mark_external: false
  no_push_state: false
  no_drawer: false
  no_navbar: false
  no_search: false
  no_inline_css: false
  no_page_style: false
  no_break_layout: true
  no_toc: false
  no_third_column: false
  no_large_headings: false
  no_structured_data: false
  no_theme_color: false
  no_breadcrumbs: false

  use_lsi: false
  cookies_banner: false
  advertise: false
  hide_dates: false
  hide_last_modified: false

  dark_mode:
    always: false
    dynamic: true
    sunrise: 6
    sunset: 18
    icon: true

  offline:
    enabled: false
    cache_version: 1
    precache_assets:
      - /assets/img/swipe.svg

optional_front_matter:
  remove_originals: true

readme_index:
  remove_originals: true
  with_frontmatter: true

relative_links:
  collections: true

titles_from_headings:
  strip_title: true
  collections: true

compress_html:
  comments: ["<!-- ", " -->"]
  clippings: all
  endings: all
  ignore:
    envs: [development]

sass:
  style: compressed
